<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハザードマップ（錦糸町）</title>
  <style>
    /* マップを画面いっぱいに表示するためのスタイル */
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: 100%; width: 100%; }
    
    /* 読み込み中の表示デザイン */
    #loading { 
      position: absolute; top: 10px; left: 10px; 
      background: white; padding: 10px 15px; 
      z-index: 5; border-radius: 5px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); 
    }
  </style>
</head>
<body>
  <div id="loading">熱源データを読み込み中...</div>
  <div id="map"></div>

  <script>
    // 🌟 【要変更】ご自身のGASのウェブアプリURLをここに貼り付けてください
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyadC6MAmijFqJZWQLhG9SYg-GP94DKpQc5J7bpmxxeHbO3C6Vbx5Ehhw5HpHZukN89/exec';

    let map, heatmap;
    const FLOW_THRESHOLD = 0.8; // 🌟 フロー（ピン）として表示する熱量の閾値

    async function initMap() {
      const kinshicho = { lat: 35.6966, lng: 139.8143 };
      
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 16,
        center: kinshicho,
        mapTypeId: 'roadmap',
        disableDefaultUI: true,
        zoomControl: true
      });

      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        // 1. ヒートマップ用のデータ（すべてのデータをモヤのベースにする）
        const heatmapData = data.map(point => {
          return {
            location: new google.maps.LatLng(point.lat, point.lng),
            weight: point.calculatedEnergy
          };
        });

        // ヒートマップの描画
        heatmap = new google.maps.visualization.HeatmapLayer({
          data: heatmapData,
          map: map,
          radius: 40,
          opacity: 0.6
        });

        // 2. ハイブリッド表示：熱量が閾値以上のデータだけ「ピン」としても重ねて表示する
        data.forEach(point => {
          if (point.calculatedEnergy >= FLOW_THRESHOLD) {
            // 条件を満たす（今そこにある危機）データにピンを立てる
            const marker = new google.maps.Marker({
              position: { lat: point.lat, lng: point.lng },
              map: map,
              title: point.category,
              animation: google.maps.Animation.DROP, // ピンが落ちてくる演出
              icon: {
                // ピンの色や形をカスタマイズ（標準の赤ピンよりも目立たせることも可能）
                url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
              }
            });

            // ピンをクリックしたときに、カテゴリ（例：「ポイ捨て」）をフキダシで表示する
            const infoWindow = new google.maps.InfoWindow({
              content: `<div style="padding:5px;"><strong>${point.category}</strong>（発生中）</div>`
            });

            marker.addListener("click", () => {
              infoWindow.open(map, marker);
            });
          }
        });

        document.getElementById('loading').style.display = 'none';
        
      } catch (error) {
        console.error('データの取得に失敗しました:', error);
        document.getElementById('loading').innerText = 'データの読み込みに失敗しました';
      }
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBMCEQHdlzcrcLI4hziAioehbIs4CRWerA&libraries=visualization&callback=initMap"></script>
</body>
</html>
