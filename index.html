ここで重要な点に気づきました。返ってきたデータの中で一番新しい報告は2026-07-10T09:03:10です。今Chromeで報告した分がここに入っていません(今日は7/11のはずです)。つまり、「報告しました」というトーストは出ているのに、実際にはスプレッドシートに新しい行が書き込まれていない可能性が高いです。

疑っている原因:no-corsモードでのPOSTが、実際にはGETとして処理されている
Google Apps ScriptのWebアプリURL(.../exec)は、内部的に一度302リダイレクトを挟んで実際の実行結果を返す仕組みになっています。ブラウザのfetchでPOST + no-corsを組み合わせると、この302リダイレクトを追いかける際に、ブラウザの仕様でPOSTがGETに自動変換されてしまうことがあります。これは古くから知られているApps Script特有の落とし穴です。

もしこれが起きていると:

doPostが一度も実行されず、代わりにdoGetが呼ばれる
しかしno-corsモードだとレスポンスの中身を一切見れない(「不透明な応答」)ため、エラーも出ず、.then()は必ず成功扱いになる
結果、「報告しました」と表示されるのに、実際は何も書き込まれない
これは、これまでの「報告してもピンが立たない」「削除が効かない」「フィードバックが保存されない」をすべて一つの原因で説明できます。

const SPREADSHEET_ID = '15nCeNRUUijzXUv3iNZIVb-gKeSGfiMAf42QlJtgpGKE';

// 🌟 修正: report/delete/feedback もすべて doGet 経由(GETリクエスト)に統一
//    → GASの exec URL は内部で302リダイレクトを挟むため、POST + no-cors の組み合わせだと
//      ブラウザ仕様でPOSTがGETに化けてしまい doPost が実行されないケースがある。
//      doGet は既に動作実績があるため、書き込み系もすべてこちらに寄せて確実性を優先する。
function doGet(e) {
  try {
    const action = e.parameter.action;

    if (action === 'report') {
      return handleReport(e.parameter);
    }
    if (action === 'delete') {
      return handleDelete(e.parameter);
    }
    if (action === 'feedback') {
      return handleFeedback(e.parameter);
    }

    // action が無ければ従来通り地図データを返す
    const heatData = generateHeatData();
    return ContentService.createTextOutput(JSON.stringify(heatData))
      .setMimeType(ContentService.MimeType.JSON);

  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({ error: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function handleReport(params) {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheet = ss.getSheetByName('Logs');
  const date = new Date();
  sheet.appendRow([
    date,
    params.userId,
    params.category,
    Number(params.lat),
    Number(params.lng),
    '',
    ''
  ]);
  return ContentService.createTextOutput(JSON.stringify({ success: true }))
    .setMimeType(ContentService.MimeType.JSON);
}

function handleDelete(params) {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheet = ss.getSheetByName('Logs');
  const rowIndex = Number(params.index);

  if (sheet.getRange(rowIndex, 2).getValue() === params.userId) {
    sheet.getRange(rowIndex, 6).setValue('DELETED');
    return ContentService.createTextOutput(JSON.stringify({ success: true }))
      .setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput(JSON.stringify({ success: false, reason: 'userId mismatch' }))
    .setMimeType(ContentService.MimeType.JSON);
}

function handleFeedback(params) {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheet = ss.getSheetByName('Logs');
  const rowIndex = Number(params.index);
  sheet.getRange(rowIndex, 7).setValue(params.answer);
  return ContentService.createTextOutput(JSON.stringify({ success: true }))
    .setMimeType(ContentService.MimeType.JSON);
}

// 🌟 doPost は今後使わない想定だが、念のため空実装として残す(未使用)
function doPost(e) {
  return ContentService.createTextOutput(JSON.stringify({ success: false, reason: 'doPost is deprecated, use doGet with action param' }))
    .setMimeType(ContentService.MimeType.JSON);
}

function sendFeedback(pointIndex, answer) {
  if (activeInfoWindow) activeInfoWindow.close();
  const url = GAS_URL + '?action=feedback&index=' + pointIndex + '&answer=' + answer;
  fetch(url)
    .then(res => res.json())
    .then((result) => {
      if (result.success) {
        showToast(answer === 'YES' ? 'フィードバックありがとうございます！' : 'ズレの報告ありがとうございます。');

function deletePin(pointIndex, pointUserId) {
  if (confirm('本当にこの報告を削除しますか？')) {
    if (activeInfoWindow) activeInfoWindow.close();
    const url = GAS_URL + '?action=delete&index=' + pointIndex + '&userId=' + encodeURIComponent(pointUserId);
    fetch(url)
      .then(res => res.json())
      .then(async (result) => {
        if (result.success) {
          showToast('報告を削除しました。');
          await refreshMapData();
        } else {
          showToast('削除に失敗しました: ' + (result.reason || '権限がありません'));

      .catch(() => showToast('通信エラーが発生しました。'));
  }

  </div>
 
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyadC6MAmijFqJZWQLhG9SYg-GP94DKpQc5J7bpmxxeHbO3C6Vbx5Ehhw5HpHZukN89/exec';
 
    let map, heatmap, activeInfoWindow;
    let markerList = []; 
    let knownPinIndexes = new Set();
    let userId = 'GUEST_USER';
    let currentMode = 'recent'; 
 
    liff.init({ liffId: '2010604774-3Szn0qI6' }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => { userId = profile.userId; });
      } else {
        liff.login();
      }
    }).catch(err => console.error('LIFF初期化失敗:', err));
 
    async function initMap() {
      const kinshicho = { lat: 35.6966, lng: 139.8143 };
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 16, center: kinshicho, mapTypeId: 'roadmap', disableDefaultUI: true, zoomControl: true
      });
      await refreshMapData();
    }
 
    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('btn-' + mode).classList.add('active');
      if (activeInfoWindow) activeInfoWindow.close();
      applyView(); 
    }
 
    function applyView() {
      if (heatmap) {
        heatmap.setMap(currentMode === 'moya' ? map : null);
      }
 
      const now = new Date();
      markerList.forEach(item => {
        let shouldShow = false;
        if (currentMode === 'recent') {
          // 直近1時間以内なら無条件で表示（誰の投稿でも）
          const diffMin = Math.abs(now - new Date(item.data.timestamp)) / (1000 * 60);
          if (diffMin <= 60) shouldShow = true;
        } else if (currentMode === 'mine') {
          // 自分の投稿なら無条件で表示
          if (item.data.userId === userId) shouldShow = true;
        }
        item.marker.setMap(shouldShow ? map : null);
      });
    }
 
    async function refreshMapData() {
      try {
        const response = await fetch(GAS_URL + "?t=" + new Date().getTime());
        const text = await response.text();
        const data = JSON.parse(text);
 
        // 🌟サーバー側でエラーが起きた場合、その内容をそのまま表示する
        if (data.error) {
          console.error('サーバーエラー:', data.error);
          showToast('サーバーエラー: ' + data.error);
          return;
        }
 
        if (heatmap) heatmap.setMap(null);
        markerList.forEach(m => m.marker.setMap(null));
        markerList = []; 
 
        const heatmapData = data.map(point => ({
          location: new google.maps.LatLng(point.lat, point.lng),
          weight: point.calculatedEnergy
        }));
        heatmap = new google.maps.visualization.HeatmapLayer({
          data: heatmapData, radius: 40, opacity: 0.6
        });
 
        const now = new Date();
        data.forEach(point => {
          const diffMin = Math.abs(now - new Date(point.timestamp)) / (1000 * 60);
          const isMine = point.userId === userId;
          
          // 1時間以内のデータ、または自分のデータなら裏側でピンを作っておく
          if (diffMin <= 60 || isMine) {
            const isNew = !knownPinIndexes.has(point.index);
            knownPinIndexes.add(point.index);
            createMarkerObj(point, isNew);
          }
        });
 
        applyView(); 
 
      } catch (error) {
        console.error('データ取得エラー:', error);
        showToast('地図データの読み込みに失敗しました。');
      }
    }
 
    function getTimeAgo(dateString) {
      if (!dateString) return 'たった今';
      const now = new Date();
      const past = new Date(dateString);
      const diffMin = Math.floor(Math.abs(now - past) / (1000 * 60));
      if (diffMin < 1) return 'たった今';
      if (diffMin < 60) return diffMin + '分前';
      const diffHour = Math.floor(diffMin / 60);
      if (diffHour < 24) return diffHour + '時間前';
      return Math.floor(diffHour / 24) + '日前';
    }
 
    function createMarkerObj(point, isNew) {
      const marker = new google.maps.Marker({
        position: { lat: point.lat, lng: point.lng },
        title: point.category,
        animation: isNew ? google.maps.Animation.DROP : null 
      });
      
      const timeText = isNew ? 'たった今' : getTimeAgo(point.timestamp);
 
      let contentHtml = `
        <div style="padding:5px; width: 160px;">
          <div style="font-weight:bold; font-size:14px; margin-bottom:4px;">${point.category}</div>
          <div style="color:#666; font-size:11px; margin-bottom:10px;">⌚ ${timeText}</div>
          
          <div style="border-top: 1px dashed #ccc; padding-top: 8px;">
            <div style="font-size:11px; margin-bottom:5px; font-weight:bold; color:#333;">📍 位置は正確でしたか？</div>
            <div style="display: flex; gap: 5px;">
              <button onclick="sendFeedback(${point.index}, 'YES')" style="flex:1; padding:6px; background:#fff; border:1px solid #06C755; color:#06C755; border-radius:4px; font-size:12px; cursor:pointer;">はい</button>
              <button onclick="sendFeedback(${point.index}, 'NO')" style="flex:1; padding:6px; background:#fff; border:1px solid #ff4d4f; color:#ff4d4f; border-radius:4px; font-size:12px; cursor:pointer;">いいえ</button>
            </div>
          </div>
      `;
 
      if (point.userId === userId) {
        contentHtml += `
          <div style="margin-top: 10px;">
            <button onclick="deletePin(${point.index}, '${point.userId}')" style="width:100%; padding:6px; background:#f0f0f0; border:none; color:#666; border-radius:4px; font-size:11px; cursor:pointer;">🗑️ この報告を削除する</button>
          </div>
        `;
      }
 
      contentHtml += `</div>`;
      const infoWindow = new google.maps.InfoWindow({ content: contentHtml });
      
      marker.addListener("click", () => {
        if (activeInfoWindow) activeInfoWindow.close();
        infoWindow.open(map, marker);
        activeInfoWindow = infoWindow;
      });
 
      markerList.push({ marker: marker, data: point });
    }
 
    // 🌟修正: no-cors + POST をやめ、動作実績のある GET 方式に統一。
    // これにより成功/失敗が正しくわかるようになる。
    function submitReport() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = '位置情報を取得中...';
 
      if (!navigator.geolocation) {
        showToast('このブラウザは位置情報に対応していません。');
        btn.disabled = false; return;
      }
 
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const category = document.getElementById('category').value;
          btn.innerText = 'データを送信中...';
 
          const reportUrl = GAS_URL
            + '?action=report'
            + '&userId=' + encodeURIComponent(userId)
            + '&category=' + encodeURIComponent(category)
            + '&lat=' + lat
            + '&lng=' + lng;
 
          fetch(reportUrl)
            .then(res => res.json())
            .then(async (result) => {
              if (result.success) {
                showToast('報告が完了しました！');
                switchMode('recent');
                await refreshMapData();
                map.panTo({ lat: lat, lng: lng });
              } else {
                showToast('報告に失敗しました: ' + (result.error || result.reason || '不明なエラー'));
              }
              btn.disabled = false;
              btn.innerText = '現在地を取得して報告する';
            })
            .catch(error => {
              showToast('通信エラーが発生しました。通信環境を確認してください。');
              btn.disabled = false;
              btn.innerText = '現在地を取得して報告する';
            });
        },
        function(error) {
          // 🌟位置情報が「拒否」された場合(code===1)、設定手順のモーダルを自動表示する
          if (error.code === 1) {
            document.getElementById('helpModal').style.display = 'flex';
            showToast('位置情報の許可が必要です。');
          } else {
            showToast('位置情報が取得できませんでした。');
          }
          btn.disabled = false;
          btn.innerText = '現在地を取得して報告する';
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }
 
    function sendFeedback(pointIndex, answer) {
      if (activeInfoWindow) activeInfoWindow.close();
      const url = GAS_URL + '?action=feedback&index=' + pointIndex + '&answer=' + answer;
      fetch(url)
        .then(res => res.json())
        .then((result) => {
          if (result.success) {
            showToast(answer === 'YES' ? 'フィードバックありがとうございます！' : 'ズレの報告ありがとうございます。');
          } else {
            showToast('フィードバックの送信に失敗しました。');
          }
        })
        .catch(() => showToast('通信エラーが発生しました。'));
    }
 
    function deletePin(pointIndex, pointUserId) {
      if (confirm('本当にこの報告を削除しますか？')) {
        if (activeInfoWindow) activeInfoWindow.close();
        const url = GAS_URL + '?action=delete&index=' + pointIndex + '&userId=' + encodeURIComponent(pointUserId);
        fetch(url)
          .then(res => res.json())
          .then(async (result) => {
            if (result.success) {
              showToast('報告を削除しました。');
              await refreshMapData();
            } else {
              showToast('削除に失敗しました: ' + (result.reason || '権限がありません'));
            }
          })
          .catch(() => showToast('通信エラーが発生しました。'));
      }
    }
 
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBMCEQHdlzcrcLI4hziAioehbIs4CRWerA&libraries=visualization&callback=initMap"></script>
</body>
