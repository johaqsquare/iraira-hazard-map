<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>html2canvas 動作確認テスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; background:#f0f0f0; margin:0; }
  h2 { font-size:15px; text-align:center; color:#333; }
  #card { width: 300px; background:white; border-radius:14px; overflow:hidden; margin: 0 auto 20px; border:1px solid #ddd; }
  #card .photo { height:160px; background:#f2f1ec; position:relative; }
  #card .photo .circle1 { position:absolute; width:80px;height:80px;border-radius:50%; background:rgba(226,75,74,0.35); top:40px;left:60px; }
  #card .photo .pin { position:absolute; width:14px;height:14px;border-radius:50%; background:#06C755; border:2px solid white; top:80px;left:95px; }
  #card .photo .tag { position:absolute; top:8px;left:8px; background:rgba(0,0,0,0.55); color:#fff; font-size:11px; padding:3px 8px; border-radius:10px; }
  #card .body { padding:14px 16px; }
  #card .date { font-size:11px; color:#888; margin:0 0 4px; }
  #card .title { font-size:16px; font-weight:bold; margin:0 0 8px; }
  #card .desc { font-size:13px; color:#555; line-height:1.6; margin:0 0 10px; }
  #card .tags span { font-size:11px; background:#eef; color:#448; padding:3px 8px; border-radius:6px; margin-right:6px; }
  button { display:block; width:280px; margin:0 auto 12px; padding:12px; font-size:15px; border:none; border-radius:8px; background:#06C755; color:white; font-weight:bold; }
  button:disabled { background:#aaa; }
  #shareBtn { background:#333; }
  #result { text-align:center; margin-top:20px; }
  #result img { max-width:300px; border:1px solid #ccc; border-radius:8px; }
  #log { max-width:280px; margin:20px auto; font-size:12px; color:#900; white-space:pre-wrap; background:white; padding:10px; border-radius:6px; }
  #supportInfo { max-width:280px; margin:10px auto; font-size:11px; color:#666; background:white; padding:8px; border-radius:6px; }
</style>
</head>
<body>

<h2>html2canvas 動作確認テスト</h2>

<div id="card">
  <div class="photo">
    <div class="circle1"></div>
    <div class="pin"></div>
    <div class="tag">錦糸町 南口付近</div>
  </div>
  <div class="body">
    <p class="date">2026年7月11日 15:32</p>
    <p class="title">ポイ捨てを目撃</p>
    <p class="desc">この付近では直近30日で「ポイ捨て」の報告が最多。街の小さな違和感を記録しました。</p>
    <div class="tags"><span>#イライラハザードマップ</span><span>#錦糸町</span></div>
  </div>
</div>

<button id="btn" onclick="capture()">この見た目のまま画像化する</button>

<div id="log"></div>
<div id="result"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerText += msg + '\n';
}

async function capture() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerText = '画像化しています...';

  try {
    const card = document.getElementById('card');
    const canvas = await html2canvas(card, {
      backgroundColor: '#ffffff',
      scale: 3, // 🌟2→3に引き上げ(画質改善)
      useCORS: true
    });

    log('✅ html2canvas 成功。生成サイズ: ' + canvas.width + ' x ' + canvas.height);

    // 🌟 toDataURL(base64) ではなく toBlob を使う。
    //    base64をそのまま<a>タグのhrefに渡す方式は、Androidの一部ブラウザ/
    //    アプリ内ブラウザで download 属性が無視されたり、長押し保存で
    //    正しいファイルとして認識されない場合がある。Blob + ObjectURL の方が
    //    実ファイルとして扱われるため信頼性が高い。
    canvas.toBlob(function(blob) {
      if (!blob) {
        log('❌ Blobの生成に失敗しました');
        btn.disabled = false;
        btn.innerText = 'この見た目のまま画像化する';
        return;
      }

      const blobUrl = URL.createObjectURL(blob);
      const fileName = 'irairahazard_share_test.png';

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<p style="font-size:13px;color:#333;">生成結果 ↓</p>';

      const img = document.createElement('img');
      img.src = blobUrl;
      resultDiv.appendChild(img);

      // 🌟 Web Share API (navigator.share): 本番で使いたい理想の共有方式。
      //    OS標準の共有シート(LINE・X・写真アプリ等を選べる画面)を1タップで呼び出せる。
      //    ファイル共有に対応しているか(canShareでフィーチャーディテクト)を確認し、
      //    対応していればボタンを表示する。
      const file = new File([blob], fileName, { type: 'image/png' });
      const canUseShareAPI = navigator.canShare && navigator.canShare({ files: [file] });

      if (canUseShareAPI) {
        const shareBtn = document.createElement('button');
        shareBtn.id = 'shareBtn';
        shareBtn.innerText = '📤 共有する(本番で使いたい方式)';
        shareBtn.style.marginTop = '14px';
        shareBtn.onclick = async () => {
          try {
            await navigator.share({
              files: [file],
              title: 'イライラハザードマップ',
              text: 'ポイ捨てを目撃しました #イライラハザードマップ'
            });
            log('✅ navigator.share 成功(共有シートが開きました)');
          } catch (shareError) {
            log('❌ navigator.share エラー: ' + shareError.message);
          }
        };
        resultDiv.appendChild(shareBtn);

        const info = document.createElement('div');
        info.id = 'supportInfo';
        info.innerText = 'この端末・ブラウザは Web Share API(ファイル共有)に対応しています。';
        resultDiv.appendChild(info);
      } else {
        const info = document.createElement('div');
        info.id = 'supportInfo';
        info.innerText = '⚠️ この端末・ブラウザは Web Share API のファイル共有に対応していません。ダウンロードリンク・長押し保存をお試しください。';
        resultDiv.appendChild(info);
      }

      // フォールバック用のダウンロードリンク(Blob方式)
      const link = document.createElement('a');
      link.href = blobUrl;
      link.download = fileName;
      link.innerText = '📥 ダウンロードリンクを試す(Blob方式)';
      link.style.display = 'block';
      link.style.textAlign = 'center';
      link.style.marginTop = '10px';
      link.style.color = '#06C755';
      resultDiv.appendChild(link);

      const hint = document.createElement('p');
      hint.style.fontSize = '12px';
      hint.style.color = '#666';
      hint.style.textAlign = 'center';
      hint.style.marginTop = '10px';
      hint.innerText = '(画像を長押しして保存できるかも試してください)';
      resultDiv.appendChild(hint);

      btn.disabled = false;
      btn.innerText = 'もう一度画像化する';
    }, 'image/png');

  } catch (error) {
    log('❌ エラー発生: ' + error.message);
    btn.disabled = false;
    btn.innerText = 'この見た目のまま画像化する';
  }
}
</script>
</body>
</html>
